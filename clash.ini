[custom]
;是否启用规则生成器
enable_rule_generator=true
;是否覆盖原订阅自带的规则
overwrite_original_rules=true
; 节点清洗：剔除机场展示/说明/防失联/流量提示节点
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅

; ==========================================================
; 1) 规则（自上而下优先级）
; ==========================================================
;屏蔽adobe 给足权限排最上，单纯在应用层选择屏蔽只会屏蔽国外链接，因为国内也能访问adobe部分页面，因此在openclash中如果选择了绕过大陆，
;国内能访问的adobe域名或ip也就跟着绕过了内核直接走了直连，所以还需在【流量控制】菜单下的【绕过指定区域 IPv4 黑名单中】加上adobe域名：如下
;adobe.com
;adobelogin.com
;adobe.io
;behance.net

ruleset=🟥 Adobe,[]GEOSITE,adobe
ruleset=🟥 Adobe,[]GEOIP,adobe,no-resolve

; --- 私网直连 ---
ruleset=🌎️ 国内网站,[]GEOSITE,private
ruleset=🌎️ 国内网站,[]GEOIP,private,no-resolve

; --- 国内直连 ---
ruleset=🌎️ 国内网站,[]GEOSITE,cn
ruleset=🌎️ 国内网站,[]GEOIP,cn,no-resolve

; --- Aethersailor 直连补丁 ---
ruleset=🌎️ 国内网站,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=🌎️ 国内网站,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800

; --- Aethersailor 代理补丁（仅兜底用，不越权）---
ruleset=🌎️ 海外网站,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🌎️ 海外网站,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800

; --- 国内可用 / 下载 / BT ---
ruleset=🌎️ 国内网站,[]GEOSITE,google-cn
ruleset=🌎️ 国内网站,[]GEOSITE,category-games@cn
ruleset=🌎️ 国内网站,[]GEOSITE,category-game-platforms-download
ruleset=🌎️ 国内网站,[]GEOSITE,category-public-tracker

;------------请在下方区域内添加应用---------------
; --- 工具 ---
ruleset=📘 Notion,[]GEOSITE,Notion
ruleset=📘 Notion,[]GEOIP,Notion,no-resolve

ruleset=📘 GitHub,[]GEOSITE,github
ruleset=📘 GitHub,[]GEOIP,github,no-resolve

ruleset=🗺 测速工具,[]GEOSITE,category-speedtest

; --- 社交软件 ---
ruleset=📲 Telegram,[]GEOSITE,telegram
ruleset=📲 Telegram,[]GEOIP,telegram,no-resolve

ruleset=📲 TikTok,[]GEOSITE,tiktok
ruleset=📲 TikTok,[]GEOIP,tiktok,no-resolve

ruleset=📲 Instagram,[]GEOSITE,instagram

ruleset=📲 X,[]GEOSITE,twitter
; --- AI ---
ruleset=🤖 AI,[]GEOSITE,openai
ruleset=🤖 AI,[]GEOSITE,category-ai-!cn
; --- 服务商 ---
ruleset=🍎 苹果服务,[]GEOSITE,apple

ruleset=☁️ cloudflare,[]GEOSITE,cloudflare
ruleset=☁️ cloudflare,[]GEOIP,cloudflare,no-resolve

ruleset=🔎 Google,[]GEOSITE,google
ruleset=🔎 Google,[]GEOIP,google,no-resolve

ruleset=🧩 微软服务,[]GEOSITE,microsoft
ruleset=🧩 微软服务,[]GEOIP,microsoft,no-resolve
; --- 海外媒体 ---
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🎬 Netflix,[]GEOSITE,netflix
ruleset=🎬 Netflix,[]GEOIP,netflix,no-resolve
; --- 游戏 ---
ruleset=🎮 游戏下载,clash-classic:https://testingcf.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Game/GameDownload/GameDownload.list,28800
ruleset=🎮 游戏下载,clash-classic:https://testingcf.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Game/GameDownloadCN/GameDownloadCN.list,28800

ruleset=🎮 游戏平台,clash-classic:https://testingcf.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Origin/Origin.list,28800
ruleset=🎮 游戏平台,clash-classic:https://testingcf.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Blizzard/Blizzard.list,28800
ruleset=🎮 游戏平台,clash-classic:https://testingcf.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Steam/Steam.list,28800
ruleset=🎮 游戏平台,clash-classic:https://testingcf.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Epic/Epic.list,28800
ruleset=🎮 游戏平台,clash-classic:https://testingcf.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/EA/EA.list,28800
ruleset=🎮 游戏平台,clash-classic:https://testingcf.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Riot/Riot.list,28800
ruleset=🎮 游戏平台,clash-classic:https://testingcf.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Xbox/Xbox.list,28800

ruleset=🎮 游戏加速,clash-classic:https://testingcf.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Game/Game.list,28800
; --- 兜底 ---
ruleset=🐟 漏网之鱼,[]FINAL


